services:
  - type: web
    name: solana-sniper-bot
    env: python
    region: oregon
    plan: free
    buildCommand: ""
    startCommand: "python3 automated_sniper_bot.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: PORT
        value: "10000"
    autoDeploy: true
